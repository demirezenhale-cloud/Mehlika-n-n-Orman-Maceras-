<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mehlika'nın Orman Macerası 🎃</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #0d1117;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Press Start 2P', monospace;
      overflow: hidden;
    }

    /* ── Phase 1: Kaçan Buton ── */
    #phase1 {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.8s;
      background: linear-gradient(135deg, #0d2818, #1a4a2e, #0d2818);
    }
    .card {
      background: rgba(0,0,0,0.7);
      border: 4px solid #f97316;
      border-radius: 4px;
      padding: 56px 72px;
      text-align: center;
      box-shadow: 0 0 40px rgba(249,115,22,0.4), inset 0 0 30px rgba(0,0,0,0.5);
      max-width: 680px; width: 92%;
      position: relative; z-index: 10;
    }
    .card-emoji { font-size: 4.5rem; display:block; margin-bottom:20px; animation: bounce 1s infinite alternate; }
    @keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-12px)} }
    .card-title-small { font-size:0.55rem; color:#888; margin-bottom:8px; letter-spacing:2px; }
    .card h1 { font-size:1.4rem; color:#f97316; line-height:2; margin-bottom:12px; }
    .card .sub { font-size:0.7rem; color:#888; margin-top:14px; }
    .hint { font-size:0.7rem; color:#fbbf24; margin-top:18px; min-height:22px; }
    #counter {
      position:fixed; top:16px; right:20px;
      font-size:0.55rem; color:#f97316;
      background:rgba(0,0,0,0.7); border:2px solid #f97316;
      padding:8px 12px; border-radius:4px; z-index:50;
    }
    #runBtn {
      position: fixed;
      padding: 12px 24px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.65rem;
      border: none; border-radius: 4px;
      background: linear-gradient(180deg,#fb923c,#c2410c);
      color: #fff; cursor: pointer;
      box-shadow: 0 5px 0 #7c2d12, 0 8px 24px rgba(249,115,22,0.5);
      z-index:100; user-select:none;
    }
    #runBtn:active { transform:translateY(4px); box-shadow:0 1px 0 #7c2d12; }
    .balloon {
      position:fixed; bottom:-100px; pointer-events:none;
      animation: floatUp linear forwards;
    }
    @keyframes floatUp {
      0%   { transform:translateY(0) translateX(0); opacity:1; }
      100% { transform:translateY(-120vh) translateX(20px); opacity:0; }
    }
    .leaf {
      position:fixed; pointer-events:none; z-index:50;
      animation: leafDrift linear forwards;
    }
    @keyframes leafDrift {
      0%   { transform:translateY(-20px) translateX(0) rotate(0deg); opacity:0.9; }
      30%  { transform:translateY(30vh) translateX(-60px) rotate(120deg); opacity:0.9; }
      60%  { transform:translateY(60vh) translateX(30px) rotate(240deg); opacity:0.8; }
      100% { transform:translateY(110vh) translateX(-40px) rotate(400deg); opacity:0; }
    }
    .confetti-piece {
      position:fixed; animation:fall linear forwards;
      border-radius:2px; pointer-events:none;
    }
    @keyframes fall {
      0%  { transform:translateY(0) rotate(0deg); opacity:1; }
      100%{ transform:translateY(110vh) rotate(720deg); opacity:0; }
    }

    /* ── Phase 2: Game ── */
    #phase2 {
      display:none; position:fixed; inset:0;
      flex-direction:column; align-items:center; justify-content:center;
    }
    #gameCanvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border:4px solid #f97316;
      box-shadow: 0 0 60px rgba(255,165,0,0.3);
      max-width: 100vw;
    }
    #textBox {
      display:none; position:fixed;
      bottom:80px; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,0.88); border:3px solid #f97316;
      border-radius:4px; padding:14px 22px;
      max-width:680px; width:92%;
      color:#fff; font-size:0.85rem; line-height:2.4; text-align:center;
      z-index:200;
    }
    #mobileControls {
      display:none; position:fixed; bottom:12px;
      width:100%; justify-content:space-between; padding:0 20px; z-index:300;
    }
    .mbtn {
      font-family:'Press Start 2P',monospace; font-size:0.7rem;
      padding:14px 22px; border:3px solid #f97316;
      background:rgba(0,0,0,0.7); color:#f97316; border-radius:4px;
      cursor:pointer; user-select:none; -webkit-user-select:none;
      touch-action:none;
    }
    #controls {
      position:fixed; bottom:8px; left:50%; transform:translateX(-50%);
      font-size:0.35rem; color:#444; text-align:center; z-index:100;
    }

    /* ── Birthday Overlay ── */
    #birthdayOverlay {
      display:none; position:fixed; inset:0;
      background:#000;
      z-index:400; flex-direction:column;
      align-items:center; justify-content:center;
      text-align:center; padding:32px;
      animation: fadeIn 0.8s ease;
      overflow-y:auto;
    }
    @keyframes fadeIn { from{opacity:0;transform:scale(0.92)} to{opacity:1;transform:scale(1)} }
    #birthdayOverlay .big-emoji { font-size:4rem; margin-bottom:12px; }
    #birthdayOverlay h2 { color:#f97316; font-size:0.9rem; line-height:2; margin-bottom:16px; }
    #birthdayOverlay p  { color:#ccc; font-size:0.8rem; line-height:2.4; max-width:560px; margin-bottom:20px; }
    #birthdayOverlay .gif-wrap {
      position:relative; display:inline-block;
      border-radius:14px; overflow:hidden;
      border:3px solid #f97316;
      box-shadow:0 0 40px rgba(255,140,0,0.5);
      margin:12px 0;
    }
    #birthdayOverlay .gif-wrap::after {
      content:'';
      position:absolute; inset:0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.15), rgba(0,0,0,0.45));
      pointer-events:none;
    }
    #birthdayOverlay img {
      width:220px; display:block;
      filter: brightness(0.88) saturate(1.2);
    }
    #birthdayOverlay button {
      font-family:'Press Start 2P',monospace; font-size:0.5rem;
      padding:10px 20px; background:#f97316; color:#fff;
      border:none; border-radius:4px; cursor:pointer; margin-top:16px;
      box-shadow:0 4px 0 #7c2d12;
    }
    #birthdayOverlay button:active { transform:translateY(3px); box-shadow:0 1px 0 #7c2d12; }
  </style>
</head>
<body>

<!-- ════════════════ PHASE 1 ════════════════ -->
<div id="phase1">
  <div class="card">
    <span class="card-emoji">🎃</span>
    <p class="card-title-small">✦ KÜÇÜK MEHLİKA'NIN MACERASI ✦</p>
    <h1>MEHLİKA<br>HAZIR MISIN?</h1>
    <p class="sub">Butona tıkla… eğer yakalayabilirsen 😏</p>
    <p class="hint" id="hint"></p>
  </div>
  <div id="counter">KAÇIŞ: <span id="tries">0</span>/5</div>
  <button id="runBtn">TIKLA! 🎃</button>
</div>

<!-- ════════════════ PHASE 2 ════════════════ -->
<div id="phase2">
  <canvas id="gameCanvas"></canvas>
  <div id="textBox"></div>
  <div id="controls">[ → ] YÜRÜ &nbsp;&nbsp;&nbsp; [ A ] SALDIRI</div>
  <div id="mobileControls">
    <button class="mbtn" id="mbRight">→ YÜRÜ</button>
    <button class="mbtn" id="mbAtk">⚔ A</button>
  </div>
</div>

<!-- ════════════════ BIRTHDAY ════════════════ -->
<div id="birthdayOverlay">
  <div class="big-emoji">🎃🧡✨</div>
  <h2>İYİ Kİ DOĞDUN<br>MEHLİKA!</h2>
  <p>
    Küçük Mehlika kocaman oldun ❤️<br>
    Nice güzel mutlu yıllara,<br>
    Rabbim sağlıklı, huzurlu,<br>
    sevdiklerinle beraber<br>
    bir ömür nasip etsin 🤲🧡
  </p>
  <div class="gif-wrap">
    <img src="https://media.giphy.com/media/9re2KwzJrWvHQvQEVF/giphy.gif" alt="doğum günü">
  </div>
  <button onclick="location.reload()">TEKRAR OYNA 🎮</button>
</div>

<div id="confettiContainer" style="position:fixed;inset:0;pointer-events:none;z-index:500;"></div>

<script>
// ════════════════════════════════════════════════════
// PHASE 1 — Kaçan Buton
// ════════════════════════════════════════════════════
const SHOW_AFTER = 5;
const HINTS = [
  "KAÇIYOR! 😂",
  "DAHA HIZLI! 👀",
  "BAL KABAĞI GİBİ YUVARLANIY 🎃",
  "O MU HIZLI SEN Mİ? 😅",
  "NEREDEYSE! 🔥",
];
const BALLOONS = ['🎃','🧡','🧡','🔶','🟠','✨','🎀','🧡','🔥'];

let tries=0, caught=false, cooldown=false, btnW, btnH;
const runBtn  = document.getElementById('runBtn');
const triesEl = document.getElementById('tries');
const hintEl  = document.getElementById('hint');
const phase1  = document.getElementById('phase1');
const phase2  = document.getElementById('phase2');

function placeBtn() {
  btnW=runBtn.offsetWidth; btnH=runBtn.offsetHeight;
  const card=document.querySelector('.card');
  const rect=card.getBoundingClientRect();
  runBtn.style.left=(window.innerWidth/2-btnW/2)+'px';
  runBtn.style.top=(rect.bottom+16)+'px';
}
window.addEventListener('load', placeBtn);

function rndPos() {
  const m=20;
  return {
    x: m+Math.random()*(window.innerWidth -btnW-m*2),
    y: m+Math.random()*(window.innerHeight-btnH-m*2),
  };
}

document.addEventListener('mousemove', e => {
  if(caught||cooldown) return;
  const r=runBtn.getBoundingClientRect();
  const dist=Math.hypot(e.clientX-(r.left+r.width/2), e.clientY-(r.top+r.height/2));
  if(dist<110) escape();
});
runBtn.addEventListener('click', ()=>{ if(!caught) escape(); });
runBtn.addEventListener('touchstart', e=>{ e.preventDefault(); if(!caught) escape(); }, {passive:false});

function escape() {
  cooldown=true; tries++;
  triesEl.textContent=tries;
  hintEl.textContent=HINTS[Math.min(tries-1,HINTS.length-1)];
  if(tries>=SHOW_AFTER) {
    caught=true; runBtn.style.display='none';
    phase1.style.opacity='0';
    clearInterval(balloonInterval);
    document.querySelectorAll('.balloon').forEach(b=>b.remove());
    setTimeout(()=>{
      phase1.style.display='none';
      phase2.style.display='flex';
      initGame();
    }, 800);
    return;
  }
  const p=rndPos();
  runBtn.style.transition='left 0.2s cubic-bezier(.34,1.56,.64,1),top 0.2s cubic-bezier(.34,1.56,.64,1)';
  runBtn.style.left=p.x+'px'; runBtn.style.top=p.y+'px';
  setTimeout(()=>{ cooldown=false; }, 600);
}

function spawnBalloon() {
  const b=document.createElement('div'); b.className='balloon';
  b.textContent=BALLOONS[Math.floor(Math.random()*BALLOONS.length)];
  b.style.left=(5+Math.random()*90)+'vw';
  b.style.fontSize=(1.5+Math.random()*2)+'rem';
  b.style.animationDuration=(7+Math.random()*5)+'s';
  document.body.appendChild(b); setTimeout(()=>b.remove(),13000);
}
const balloonInterval = setInterval(spawnBalloon,600);
for(let i=0;i<8;i++) spawnBalloon();

const LEAVES = ['🍂','🍁','🍃','🍂','🍃','🍁'];
function startLeaves() {
  function spawnLeaf() {
    const l = document.createElement('div'); l.className='leaf';
    l.textContent = LEAVES[Math.floor(Math.random()*LEAVES.length)];
    l.style.left = (Math.random()*110-5)+'vw';
    l.style.top  = '-30px';
    l.style.fontSize = (1+Math.random()*1.4)+'rem';
    l.style.animationDuration = (5+Math.random()*6)+'s';
    l.style.animationDelay    = '0s';
    document.body.appendChild(l);
    setTimeout(()=>l.remove(), 12000);
  }
  spawnLeaf(); spawnLeaf(); spawnLeaf();
  setInterval(spawnLeaf, 800);
}


// ════════════════════════════════════════════════════
// PHASE 2 — Pixel Art Game
// ════════════════════════════════════════════════════
function initGame() {
  const canvas = document.getElementById('gameCanvas');
  const W = Math.min(window.innerWidth-8, 800);
  const H = Math.min(window.innerHeight-60, 420);
  canvas.width=W; canvas.height=H;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled=false;

  const SC  = 3;          // pixel scale (each sprite pixel = SC×SC real px)
  const GND = H - 60;    // ground Y

  // ── Pixel sprite helper
  function spr(rows, cmap, px, py) {
    rows.forEach((row, ry) => {
      [...row].forEach((c, rx) => {
        const col = cmap[c];
        if (!col) return;
        ctx.fillStyle = col;
        ctx.fillRect(px+rx*SC, py+ry*SC, SC, SC);
      });
    });
  }

  // ── Girl sprite (11 cols × 13 rows)
  const GC = {
    H:'#3d1c00', h:'#6b3010',  // hair
    S:'#f5c5a0', E:'#1a0800',  // skin, eye
    m:'#d47070',               // mouth
    D:'#e84393', d:'#aa005e',  // dress
    L:'#f5c5a0',               // legs (skin)
    F:'#1a0800',               // shoes
    '.':null,
  };
  const GW1 = [   // walk frame 1
    '...HHHHH..',
    '..HhhhhhH.',
    '..HSSSSSH.',
    '...SEEES..',
    '...SmmmS..',
    '...dDDDd..',
    '..dDDDDDd.',
    '..DDDDDDD.',
    '...DDDDD..',
    '....L.L...',
    '....L.L...',
    '....F.F...',
  ];
  const GW2 = [   // walk frame 2
    '...HHHHH..',
    '..HhhhhhH.',
    '..HSSSSSH.',
    '...SEEES..',
    '...SmmmS..',
    '...dDDDd..',
    '..dDDDDDd.',
    '..DDDDDDD.',
    '...DDDDD..',
    '...LL.....',
    '....LL....',
    '....FF....',
  ];
  const GATK = [  // attack frame
    '...HHHHH..',
    '..HhhhhhH.',
    '..HSSSSSH.',
    '...SEEES..',
    '...SmmmS..',
    'SdDDDDDdS.',
    'SDDDDDDDDS',
    '..DDDDDDD.',
    '...DDDDD..',
    '....L.L...',
    '....L.L...',
    '....F.F...',
  ];

  // ── Pumpkin sprite (10 cols × 10 rows)
  const PC = {
    O:'#ff7700', o:'#dd5500',
    G:'#2d7a1a', g:'#1a5010',
    E:'#1a0800', '.':null,
  };
  const PKS = [
    '.....gGG..',
    '....GGGGg.',
    '..OOOOOOo.',
    '.OOoOOOOOO',
    'OOOoOOOOOO',
    'OO.EEE.EEO',
    'OO.EEE.EEO',
    'OOOEEEEEEOO',
    'OOOOOOOOOO',
    '.OOOOOOOO.',
  ];

  // ── Trees (3 layers: 0=near, 1=mid, 2=far silhouette)
  const trees=[];
  for(let i=0;i<50;i++) {
    trees.push({
      x: i*160+Math.random()*80,
      h: 60+Math.random()*90,
      type: Math.floor(Math.random()*3), // 0=pine, 1=round, 2=tall pine
      autumn: Math.random()<0.3,         // some trees have orange leaves
      layer: [0,0,1,1,2][Math.floor(Math.random()*5)],
    });
  }

  function drawTree(x,y,h,layer,type,autumn) {
    const alpha = layer===2?0.35 : layer===1?0.65 : 1;
    ctx.globalAlpha = alpha;
    // Trunk
    const trunkW = layer===2?6:layer===1?8:10;
    const trunkH = layer===2?12:layer===1?16:20;
    if(layer<2) {
      ctx.fillStyle = layer===0?'#5c3317':'#3a2010';
      ctx.fillRect(x-trunkW/2, y-trunkH, trunkW, trunkH);
    }
    // Foliage colors
    let c1,c2,c3;
    if(layer===2) { c1=c2=c3='#071a0a'; }
    else if(autumn) { c1='#8b3a00'; c2='#c25200'; c3='#e07000'; }
    else if(layer===1) { c1='#083510'; c2='#0a4515'; c3='#0d5a1c'; }
    else { c1='#0d4a14'; c2='#156e1e'; c3='#1a8f28'; }

    if(type===0) { // pine — stacked triangles
      [[h*0.55,0],[h*0.38,h*0.22],[h*0.25,h*0.42]].forEach(([w,dy],i)=>{
        ctx.fillStyle=[c1,c2,c3][i];
        const top=y-h+dy;
        ctx.beginPath(); ctx.moveTo(x,top); ctx.lineTo(x+w/2,top+h*0.22); ctx.lineTo(x-w/2,top+h*0.22); ctx.closePath(); ctx.fill();
      });
    } else if(type===1) { // round — ellipse layers
      [[h*0.5,h*0.28,0],[h*0.38,h*0.22,h*0.14],[h*0.28,h*0.18,h*0.28]].forEach(([rx,ry,dy],i)=>{
        ctx.fillStyle=[c1,c2,c3][i];
        ctx.beginPath(); ctx.ellipse(x, y-h*0.5+dy, rx/2, ry/2, 0, 0, Math.PI*2); ctx.fill();
      });
    } else { // tall pine — narrow pyramid
      [[h*0.35,0],[h*0.28,h*0.2],[h*0.2,h*0.38],[h*0.14,h*0.52]].forEach(([w,dy],i)=>{
        ctx.fillStyle=i%2===0?c1:c2;
        ctx.fillRect(x-w/2, y-h+dy, w, h*0.22);
      });
    }
    ctx.globalAlpha=1;
  }

  // ── Mushrooms on ground
  const mushrooms=[];
  for(let i=0;i<20;i++) {
    mushrooms.push({ x:i*280+80+Math.random()*160, cap:Math.random()>0.5?'#cc2200':'#ddaa00' });
  }
  function drawMushroom(x,y,cap) {
    ctx.fillStyle='#e8d5b0'; ctx.fillRect(x-2,y-8,4,8);
    ctx.fillStyle=cap;
    ctx.beginPath(); ctx.ellipse(x,y-8,7,5,0,Math.PI,0); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.4)';
    ctx.beginPath(); ctx.ellipse(x-2,y-10,2,1.5,0,Math.PI,0); ctx.fill();
  }

  // ── Stars (twinkle)
  const stars=Array.from({length:55},()=>({
    x:Math.random()*4000, y:20+Math.random()*(GND-80),
    r:Math.random()>0.75?2:1,
    t:Math.random()*Math.PI*2,
  }));

  // ── Moon
  const moonX=W*0.78, moonY=50, moonR=28;

  // ── Fireflies (bigger glow)
  const flies=Array.from({length:18},()=>({
    x:Math.random()*4000, y:GND-20-Math.random()*160, t:Math.random()*Math.PI*2,
  }));

  // ── Fox sprite
  const FC = { O:'#e07010', o:'#a85008', W:'#f5f0e0', E:'#1a0800', F:'#2a1008', T:'#f5f0e0', '.':null };
  const FW1 = ['..EE......','.OoOoO....', '.OEEO.....', '.OWWO.....', 'OOOOOOOTT.', 'OO....OTW.', '.O....O...', '.FF...FF..'];
  const FW2 = ['..EE......','.OoOoO....', '.OEEO.....', '.OWWO.....', 'OOOOOOOTT.', 'OO....OTW.', '.OO...O...', '.FF..FF...'];

  // ── Game state
  const PUMP_X     = 1500;
  const GIRL_SW    = 11;
  const GIRL_SH    = 12;
  const GIRL_SCR_X = 70;
  const ATTACK_RANGE = GIRL_SW * 3 + 10;

  let gPhase   = 'cutscene';
  let scrollX  = 0;
  let gFrame   = 0, gTick = 0;
  let foxFrame = 0, foxTick = 0;
  let foxVisible = false, foxShown = false;
  let walking  = false;
  let attacking= false, atkTimer=0;
  let pumpSmashed=false;
  let girlScale=1, targetScale=1, growing=false;
  let particles=[];

  // Controls
  const keys={};
  let mRight=false, mAtk=false;
  window.addEventListener('keydown', e=>{ keys[e.key]=true; onKey(e.key); });
  window.addEventListener('keyup',   e=>{ keys[e.key]=false; });

  const mbRight=document.getElementById('mbRight');
  const mbAtk  =document.getElementById('mbAtk');
  mbRight.addEventListener('touchstart',e=>{e.preventDefault();mRight=true;},{passive:false});
  mbRight.addEventListener('touchend',  e=>{e.preventDefault();mRight=false;},{passive:false});
  mbAtk.addEventListener('touchstart',  e=>{e.preventDefault();onKey('a');},{passive:false});

  // Show mobile controls on touch devices
  if('ontouchstart' in window) {
    document.getElementById('mobileControls').style.display='flex';
    document.getElementById('controls').style.display='none';
  }

  function onKey(k) {
    if((k==='a'||k==='A') && gPhase==='pumpkin') {
      const pkScrX = PUMP_X - scrollX;
      if(pkScrX - GIRL_SCR_X < ATTACK_RANGE + 20) doAttack();
    }
  }

  // Text box
  const textBox=document.getElementById('textBox');
  const scenes=[
    {txt:'🌲 Bir gün küçük Mehlika,\nkaranlık bir ormanda yürüyordu…',dur:3000},
    {txt:'🍂 Yapraklar hışırdıyor, dallar sallanıyordu…\nYolu iyice karıştı!',dur:2500},
    {txt:'[ → ] tuşuna basılı tut ve ilerle!',dur:2000},
  ];
  let sIdx=0;
  function nextScene() {
    if(sIdx>=scenes.length) { textBox.style.display='none'; gPhase='playing'; return; }
    const s=scenes[sIdx++];
    textBox.style.display='block';
    textBox.innerHTML=s.txt.replace(/\n/g,'<br>');
    setTimeout(nextScene, s.dur);
  }
  setTimeout(()=>nextScene(),600);

  // Attack
  function doAttack() {
    if(attacking||pumpSmashed) return;
    gPhase='smash'; attacking=true; atkTimer=40;
    textBox.style.display='none';
    const px=PUMP_X-scrollX+5*SC, py=GND-10*SC;
    for(let i=0;i<50;i++) {
      particles.push({
        x:px+SC*5, y:py+SC*5,
        vx:(Math.random()-0.5)*10,
        vy:-Math.random()*12-2,
        color:['#ff7700','#ffd700','#dd5500','#fff','#f97316','#ff4400'][Math.floor(Math.random()*6)],
        size:3+Math.random()*8, life:1,
      });
    }
    pumpSmashed=true;
    setTimeout(()=>{ growing=true; targetScale=1.9; }, 400);
    setTimeout(()=>{
      gPhase='birthday';
      document.getElementById('birthdayOverlay').style.display='flex';
      launchConfetti();
    }, 2200);
  }

  function launchConfetti() {
    const cont=document.getElementById('confettiContainer');
    for(let i=0;i<90;i++) {
      const p=document.createElement('div'); p.className='confetti-piece';
      p.style.left=Math.random()*100+'vw'; p.style.top='-12px';
      p.style.width=(6+Math.random()*8)+'px'; p.style.height=(6+Math.random()*8)+'px';
      p.style.background=['#f97316','#fbbf24','#ef4444','#22c55e','#3b82f6','#a855f7'][Math.floor(Math.random()*6)];
      p.style.borderRadius=Math.random()>0.5?'50%':'2px';
      p.style.animationDuration=(2+Math.random()*3)+'s';
      p.style.animationDelay=(Math.random()*0.5)+'s';
      cont.appendChild(p); setTimeout(()=>p.remove(),7000);
    }
  }

  // ── Canvas leaves
  const cLeaves=[];
  for(let i=0;i<18;i++) cLeaves.push({
    x:Math.random()*W, y:Math.random()*H,
    vx:-0.4-Math.random()*0.6, vy:0.3+Math.random()*0.5,
    rot:Math.random()*Math.PI*2, rotV:(Math.random()-0.5)*0.06,
    emoji:['🍂','🍁','🍃'][Math.floor(Math.random()*3)],
    size:12+Math.random()*10, alpha:0.7+Math.random()*0.3,
  });

  // ── Main loop
  function loop() {
    ctx.clearRect(0,0,W,H);

    // Sky gradient — deep forest night
    const sg=ctx.createLinearGradient(0,0,0,GND);
    sg.addColorStop(0,'#020d05'); sg.addColorStop(0.5,'#071a0c'); sg.addColorStop(1,'#0b2a12');
    ctx.fillStyle=sg; ctx.fillRect(0,0,W,H);

    // Moon + halo
    const mg=ctx.createRadialGradient(moonX,moonY,moonR*0.5,moonX,moonY,moonR*3);
    mg.addColorStop(0,'rgba(220,255,180,0.18)'); mg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=mg; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#c8f0a0'; ctx.beginPath(); ctx.arc(moonX,moonY,moonR,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(180,230,140,0.4)'; ctx.beginPath(); ctx.arc(moonX-8,moonY-4,moonR*0.55,0,Math.PI*2); ctx.fill();

    // Stars twinkle
    const T=Date.now()/1000;
    stars.forEach(s=>{
      s.t+=0.01;
      const sx=((s.x-scrollX*0.04)%4000+4000)%4000*(W/4000);
      if(sx<-2||sx>W+2) return;
      ctx.globalAlpha=0.4+Math.sin(s.t)*0.4;
      ctx.fillStyle='#e8f8c8'; ctx.fillRect(sx,s.y,s.r,s.r);
    });
    ctx.globalAlpha=1;

    // Layer 2 — far silhouettes (slowest parallax)
    trees.filter(t=>t.layer===2).forEach(t=>{
      const tx=((t.x-scrollX*0.15)%8000+8000)%8000-80;
      if(tx>-90&&tx<W+90) drawTree(tx,GND,t.h*0.6,2,t.type,t.autumn);
    });

    // Fireflies (glowing)
    flies.forEach(f=>{
      f.t+=0.022;
      const fx=((f.x-scrollX*0.25)%4000+4000)%4000*(W/4000);
      const fy=f.y+Math.sin(f.t)*14;
      const a=(Math.sin(f.t*3)+1)/2;
      const gr=ctx.createRadialGradient(fx,fy,0,fx,fy,6);
      gr.addColorStop(0,`rgba(160,255,100,${a*0.9})`);
      gr.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(fx,fy,6,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=`rgba(220,255,180,${a})`;
      ctx.fillRect(fx-1,fy-1,2,2);
    });
    ctx.globalAlpha=1;

    // Layer 1 — mid trees
    trees.filter(t=>t.layer===1).forEach(t=>{
      const tx=((t.x-scrollX*0.35)%6000+6000)%6000-80;
      if(tx>-90&&tx<W+90) drawTree(tx,GND,t.h*0.8,1,t.type,t.autumn);
    });

    // Ground layers
    ctx.fillStyle='#050f06'; ctx.fillRect(0,GND,W,H-GND);
    ctx.fillStyle='#0d2208'; ctx.fillRect(0,GND,W,18);
    ctx.fillStyle='#164a0c'; ctx.fillRect(0,GND,W,10);
    ctx.fillStyle='#1e6e12'; ctx.fillRect(0,GND,W,4);

    // Dirt path (under character)
    ctx.fillStyle='#2a1a08';
    ctx.fillRect(0,GND+4,W,10);
    for(let px=(scrollX%40);px<W;px+=40) {
      ctx.fillStyle='#3a2510';
      ctx.fillRect(px,GND+5,18,3);
    }

    // Grass tufts
    for(let gx=(-(scrollX%18)+18);gx<W+18;gx+=18) {
      ctx.fillStyle='#22881a';
      ctx.fillRect(gx,  GND-5, 2,5);
      ctx.fillRect(gx+5,GND-8, 2,8);
      ctx.fillRect(gx+10,GND-4,2,4);
      ctx.fillStyle='#2aaa20';
      ctx.fillRect(gx+3,GND-6,1,6);
    }

    // Mushrooms
    mushrooms.forEach(m=>{
      const mx=((m.x-scrollX)%4000+4000)%4000;
      if(mx>-20&&mx<W+20) drawMushroom(mx,GND,m.cap);
    });

    // Layer 0 — near trees
    trees.filter(t=>t.layer===0).forEach(t=>{
      const tx=((t.x-scrollX*0.82)%4000+4000)%4000-80;
      if(tx>-90&&tx<W+90) drawTree(tx,GND,t.h,0,t.type,t.autumn);
    });

    // Ground fog
    const fog=ctx.createLinearGradient(0,GND-40,0,GND+20);
    fog.addColorStop(0,'rgba(10,40,10,0)');
    fog.addColorStop(0.5,'rgba(15,50,10,0.18)');
    fog.addColorStop(1,'rgba(20,60,10,0.35)');
    ctx.fillStyle=fog; ctx.fillRect(0,GND-40,W,60);

    // Canvas leaves
    cLeaves.forEach(l=>{
      l.x+=l.vx; l.y+=l.vy; l.rot+=l.rotV;
      if(l.x<-20) l.x=W+10;
      if(l.y>H+20) l.y=-20;
      ctx.save();
      ctx.globalAlpha=l.alpha;
      ctx.translate(l.x,l.y); ctx.rotate(l.rot);
      ctx.font=l.size+'px serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(l.emoji,0,0);
      ctx.restore();
    });
    ctx.globalAlpha=1;

    // Pumpkin
    const pkScrX = PUMP_X - scrollX;
    if(!pumpSmashed && pkScrX>-40 && pkScrX<W+40) {
      spr(PKS, PC, pkScrX, GND-10*SC);
    }
    if(gPhase==='playing' && pkScrX < W-80) {
      gPhase='pumpkin';
      textBox.style.display='block';
      textBox.innerHTML='🎃 BAL KABAĞI!<br>Yaklaş ve <span style="color:#fbbf24">[ A ]</span> ile parçala!';
    }

    // Particles
    particles.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.35; p.life-=0.022;
      ctx.globalAlpha=Math.max(0,p.life);
      ctx.fillStyle=p.color; ctx.fillRect(p.x,p.y,p.size,p.size);
    });
    ctx.globalAlpha=1;
    particles=particles.filter(p=>p.life>0);

    // Fox — önde yürüsün
    if(scrollX > 350) foxVisible=true;
    if(foxVisible && gPhase!=='birthday') {
      const foxScrX = GIRL_SCR_X + GIRL_SW*SC + 28;
      const FSC = 4;
      const foxSpr = (foxFrame===0?FW1:FW2);
      foxSpr.forEach((row,ry)=>[...row].forEach((c,rx)=>{
        const col=FC[c]; if(!col) return;
        ctx.fillStyle=col;
        ctx.fillRect(foxScrX+rx*FSC, GND-8*FSC+ry*FSC, FSC, FSC);
      }));
      foxTick++;
      if(foxTick>=12){ foxTick=0; foxFrame=(foxFrame+1)%2; }
      if(!foxShown) {
        foxShown=true;
        textBox.style.display='block';
        textBox.innerHTML='🦊 Bir tilki de ona katıldı!';
        setTimeout(()=>{ if(gPhase==='playing') textBox.style.display='none'; },2500);
      }
    }

    // Grow animation (Mario style)
    if(growing) {
      girlScale += (targetScale - girlScale) * 0.12;
      if(Math.abs(girlScale-targetScale)<0.01){ girlScale=targetScale; growing=false; }
    }

    // Girl (with scale)
    let sprite;
    if(attacking) {
      sprite=GATK; atkTimer--;
      if(atkTimer<=0) attacking=false;
    } else {
      sprite=walking?(gFrame===0?GW1:GW2):GW1;
    }
    ctx.save();
    ctx.translate(GIRL_SCR_X + GIRL_SW*SC/2, GND);
    ctx.scale(girlScale, girlScale);
    spr(sprite, GC, -GIRL_SW*SC/2, -GIRL_SH*SC);
    ctx.restore();

    // Movement — balkabağına kadar yürü
    const canWalk = gPhase==='playing'||gPhase==='pumpkin';
    const goRight = keys['ArrowRight']||keys['d']||keys['D']||mRight;
    const maxScroll = PUMP_X - GIRL_SCR_X - GIRL_SW*SC - 4;
    if(canWalk && goRight) {
      if(scrollX < maxScroll){ scrollX+=3; walking=true; }
      else walking=false;
    } else { walking=false; }

    // Walk animation
    gTick++;
    if(gTick>=10){ gTick=0; gFrame=(gFrame+1)%2; }

    // HUD
    const nearPump = pkScrX - GIRL_SCR_X < ATTACK_RANGE + 20;
    if(gPhase==='playing') {
      ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(8,8,190,24);
      ctx.fillStyle='#f97316'; ctx.font='7px "Press Start 2P"';
      ctx.fillText('→ İLERLE!', 14,23);
    }
    if(gPhase==='pumpkin') {
      ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(8,8,220,24);
      if(nearPump){
        ctx.fillStyle='#fbbf24'; ctx.font='7px "Press Start 2P"';
        ctx.fillText('[ A ] SALDIRI!', 14,23);
      } else {
        ctx.fillStyle='#f97316'; ctx.font='7px "Press Start 2P"';
        ctx.fillText('→ YAKLAŞ!', 14,23);
      }
    }

    requestAnimationFrame(loop);
  }
  loop();
}
</script>
